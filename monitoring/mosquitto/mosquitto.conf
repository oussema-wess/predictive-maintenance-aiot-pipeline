# ============================================================
# mosquitto.conf
# Configuration du broker MQTT Eclipse Mosquitto
# ============================================================

# Port MQTT standard
listener 1883
protocol mqtt

# Port WebSocket (pour interfaces web)
listener 9001
protocol websockets

# Autoriser les connexions anonymes (dev only)
allow_anonymous true

# Persistence des messages
persistence true
persistence_location /mosquitto/data/

# Logs
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
